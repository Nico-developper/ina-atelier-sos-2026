<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="x-apple-disable-message-reformatting" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta
            name="format-detection"
            content="telephone=no,address=no,email=no,date=no"
        />
        <title>GRM Tools Atelier — Newsletter</title>
    </head>

    <body
        style="margin: 0; padding: 0; background-color: #141616"
        bgcolor="#141616"
    >
        <center
            style="width: 100%; background-color: #141616"
            bgcolor="#141616"
        >
            <table
                role="presentation"
                width="100%"
                cellpadding="0"
                cellspacing="0"
                border="0"
                style="
                    border-collapse: collapse;
                    margin: 0;
                    padding: 0;
                    background-color: #141616;
                "
                bgcolor="#141616"
            >
                <tr>
                    <td
                        align="center"
                        style="margin: 0; padding: 0; background-color: #141616"
                        bgcolor="#141616"
                    >
                        <!-- Container 600px max (SOS) -->
                        <table
                            role="presentation"
                            width="600"
                            cellpadding="0"
                            cellspacing="0"
                            border="0"
                            style="
                                border-collapse: collapse;
                                width: 600px;
                                max-width: 600px;
                                margin: 0;
                                padding: 0;
                            "
                        >
                            <tr>
                                <td
                                    style="
                                        margin: 0;
                                        padding: 0;
                                        line-height: 0;
                                        font-size: 0;
                                    "
                                >
                                    <!--
                                      NEWSLETTER : 1 seule bannière affichée.
                                      Chaque mois, remplace simplement :
                                      - src  : Newsletter-V4-01.jpg / Newsletter-V4-02.jpg / Newsletter-V4-03.jpg
                                      - href : URL (+ UTM si besoin)
                                    -->
                                    <a
                                        href="https://grm.tools/en/atelier.html"
                                        target="_blank"
                                        rel="noopener"
                                        style="
                                            display: block;
                                            text-decoration: none;
                                            border: 0;
                                            outline: none;
                                        "
                                    >
                                        <img
                                            src="assets/Newsletter-V4-01.jpg"
                                            width="600"
                                            height="auto"
                                            border="0"
                                            alt="ATELIER — Patch. Play. Discover. Modular sandbox for sound creators."
                                            style="
                                                display: block;
                                                width: 600px;
                                                max-width: 600px;
                                                height: auto;
                                                border: 0;
                                                outline: none;
                                                text-decoration: none;
                                            "
                                        />
                                    </a>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </center>
    </body>
</html>
