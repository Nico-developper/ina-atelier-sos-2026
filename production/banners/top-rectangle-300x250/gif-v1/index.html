<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="ad.size" content="width=300,height=250" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>ATELIER 300x250</title>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
            }

            .ad {
                width: 300px;
                height: 250px;
                overflow: hidden;
                cursor: pointer;
            }

            img {
                display: block;
                width: 300px;
                height: 250px;
                border: 0;
            }
        </style>
    </head>

    <body>
        <div class="ad" id="ad">
            <img src="atelier.gif" alt="ATELIER — Patch. Play. Discover." />
        </div>

        <script>
            var clickTag =
                window.clickTag || "https://grm.tools/en/atelier.html";

            document
                .getElementById("ad")
                .addEventListener("click", function () {
                    window.open(clickTag, "_blank");
                });
        </script>
    </body>
</html>
